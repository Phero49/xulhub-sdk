name: Publish to npm
on:
  push:
    branches: [master]
permissions:
  id-token: write  # Crucial for Trusted Publishing
  contents: read
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      # No NODE_AUTH_TOKEN needed here
      - run: npm publish --provenance
